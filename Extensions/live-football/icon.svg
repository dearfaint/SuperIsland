<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pitch" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#34d97a"/>
      <stop offset="100%" stop-color="#0c7a3d"/>
    </radialGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfd6dd"/>
    </radialGradient>
  </defs>

  <!-- pitch backdrop -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#pitch)"/>
  <!-- halfway line + center circle -->
  <line x1="2" y1="32" x2="62" y2="32" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6"/>
  <circle cx="32" cy="32" r="10.5" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none"/>

  <!-- ball -->
  <circle cx="32" cy="32" r="13" fill="url(#ball)"/>
  <circle cx="32" cy="32" r="13" stroke="#1d2733" stroke-opacity="0.55" stroke-width="1.2" fill="none"/>
  <!-- center pentagon -->
  <path d="M32 25.2 L37.4 29.2 L35.4 35.4 L28.6 35.4 L26.6 29.2 Z" fill="#1d2733"/>
  <!-- panel seams -->
  <path d="M32 25.2 L32 19.4" stroke="#1d2733" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M37.4 29.2 L43 27" stroke="#1d2733" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M35.4 35.4 L39.4 40.4" stroke="#1d2733" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M28.6 35.4 L24.6 40.4" stroke="#1d2733" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M26.6 29.2 L21 27" stroke="#1d2733" stroke-width="1.4" stroke-linecap="round"/>
  <!-- glint -->
  <ellipse cx="27.4" cy="26.2" rx="3.4" ry="2.1" fill="#ffffff" fill-opacity="0.65" transform="rotate(-25 27.4 26.2)"/>
</svg>
